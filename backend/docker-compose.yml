version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-campus-events
    restart: always
    env_file:
      - .env
    environment:
      # Use the root password from your .env
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      
      # This creates the database on startup
      MYSQL_DATABASE: ${APP_DB_NAME}
      
      # IMPORTANT: These lines create the 'app' user your script is looking for
      MYSQL_USER: ${APP_DB_USER}
      MYSQL_PASSWORD: ${APP_DB_PASSWORD}
      
      # Allows root to connect from your host machine
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
